<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex">
<title>מה אוכלים? — המלצות אוכל מ-TimeOut</title>
<style>
  :root {
    --bg: #f2f3f4;
    --card: #ffffff;
    --text: #1d1d1d;
    --muted: #6d7075;
    --accent: #d13438;
    --accent-soft: #fdeaea;
    --border: #e1e3e5;
    --chip: #e9eaec;
    --chip-active: #1d1d1d;
    --chip-active-text: #ffffff;
    --new: #1e7d46;
    --new-bg: #e3f4ea;
    --shadow: 0 1px 3px rgba(0,0,0,.06), 0 4px 14px rgba(0,0,0,.05);
  }
  [data-theme="dark"] {
    --bg: #171717;
    --card: #202020;
    --text: #efefec;
    --muted: #a0a0a0;
    --accent: #ff6b6e;
    --accent-soft: #3a2626;
    --border: #303030;
    --chip: #2a2a2a;
    --chip-active: #efefec;
    --chip-active-text: #171717;
    --new: #5dd394;
    --new-bg: #1f3227;
    --shadow: 0 1px 3px rgba(0,0,0,.4);
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--bg); color: var(--text);
    font-family: "Segoe UI", "Heebo", Arial, sans-serif;
    transition: background .25s, color .25s;
  }
  header {
    padding: 28px 20px 12px; max-width: 1100px; margin: 0 auto;
    display: flex; align-items: center; justify-content: space-between; gap: 12px; flex-wrap: wrap;
  }
  h1 { margin: 0; font-size: 1.7rem; }
  h1 .accent { color: var(--accent); }
  .subtitle { color: var(--muted); font-size: .9rem; margin: 4px 0 0; }
  #themeBtn {
    border: 1px solid var(--border); background: var(--card); color: var(--text);
    border-radius: 20px; padding: 8px 14px; cursor: pointer; font-size: .9rem;
  }
  .controls { max-width: 1100px; margin: 0 auto; padding: 0 20px 8px; }
  #search {
    width: 100%; padding: 12px 16px; border-radius: 12px; border: 1px solid var(--border);
    background: var(--card); color: var(--text); font-size: 1rem; margin-bottom: 10px;
  }
  #search:focus { outline: 2px solid var(--accent); border-color: transparent; }
  .geo-row { display: flex; gap: 8px; margin-bottom: 10px; }
  #addr {
    flex: 1; padding: 10px 14px; border-radius: 12px; border: 1px solid var(--border);
    background: var(--card); color: var(--text); font-size: .92rem; min-width: 0;
  }
  #addr:focus { outline: 2px solid var(--accent); border-color: transparent; }
  #geoBtn {
    border: none; background: var(--accent); color: #fff; border-radius: 12px;
    padding: 10px 16px; cursor: pointer; font-size: .9rem; font-weight: 600; white-space: nowrap;
  }
  #geoBtn:disabled { opacity: .6; cursor: wait; }
  #geoStatus {
    display: inline-flex; align-items: center; gap: 8px; margin-bottom: 10px;
    background: var(--new-bg); color: var(--new); border-radius: 12px;
    padding: 7px 13px; font-size: .87rem; font-weight: 600;
  }
  #geoStatus.error { background: var(--accent-soft); color: var(--accent); }
  #geoStatus[hidden] { display: none; }
  #geoStatus button {
    border: none; background: none; color: inherit; cursor: pointer;
    font-size: 1rem; padding: 0; line-height: 1;
  }
  .tabs { display: flex; gap: 8px; margin-bottom: 10px; flex-wrap: wrap; }
  .tab {
    border: 1px solid var(--border); background: var(--card); color: var(--text);
    padding: 9px 18px; border-radius: 12px; cursor: pointer; font-size: .95rem; font-weight: 600;
  }
  .tab.active { background: var(--accent); border-color: var(--accent); color: #fff; }
  .tab .count { font-weight: 400; font-size: .8rem; opacity: .75; }
  .views { display: flex; gap: 8px; margin-bottom: 10px; }
  .viewbtn {
    border: 1px solid var(--border); background: var(--card); color: var(--text);
    padding: 8px 16px; border-radius: 12px; cursor: pointer; font-size: .88rem;
  }
  .viewbtn.active { background: var(--chip-active); color: var(--chip-active-text); border-color: var(--chip-active); }
  .chips { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 6px; }
  .chip {
    border: none; background: var(--chip); color: var(--text);
    padding: 6px 13px; border-radius: 16px; cursor: pointer; font-size: .83rem;
  }
  .chip.active { background: var(--chip-active); color: var(--chip-active-text); }
  .chip.newchip.active { background: var(--new); color: #fff; }
  main { max-width: 1100px; margin: 0 auto; padding: 10px 20px 60px; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 16px; }
  .card {
    background: var(--card); border: 1px solid var(--border); border-radius: 16px;
    padding: 18px; box-shadow: var(--shadow); display: flex; flex-direction: column; gap: 10px;
  }
  .card-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; }
  .card h3 { margin: 0; font-size: 1.15rem; line-height: 1.3; }
  .badges { display: flex; gap: 5px; flex-shrink: 0; }
  .badge-new {
    background: var(--new-bg); color: var(--new); font-size: .75rem; font-weight: 700;
    padding: 3px 10px; border-radius: 12px; white-space: nowrap;
  }
  .badge-dist {
    background: var(--chip); color: var(--text); font-size: .75rem; font-weight: 700;
    padding: 3px 10px; border-radius: 12px; white-space: nowrap;
  }
  .badge-closing {
    background: #fdf0e0; color: #b25e09; font-size: .75rem; font-weight: 700;
    padding: 3px 10px; border-radius: 12px; white-space: nowrap;
  }
  [data-theme="dark"] .badge-closing { background: #38290f; color: #f0a94f; }
  .type-tag { color: var(--accent); font-size: .85rem; font-weight: 600; }
  .field { font-size: .88rem; line-height: 1.5; display: flex; gap: 7px; }
  .field .ico { flex-shrink: 0; }
  .field .missing { color: var(--muted); font-style: italic; }
  .opening { color: var(--new); font-size: .85rem; font-weight: 600; }
  .open-badge {
    display: inline-block; font-size: .75rem; font-weight: 700;
    padding: 2px 9px; border-radius: 10px; margin-inline-start: 6px; white-space: nowrap;
  }
  .open-badge.open { background: var(--new-bg); color: var(--new); }
  .open-badge.closed { background: var(--accent-soft); color: var(--accent); }
  .src-badge {
    display: inline-block; font-size: .68rem; font-weight: 600; white-space: nowrap;
    padding: 1px 7px; border-radius: 9px; margin-inline-start: 5px;
    background: var(--chip); color: var(--muted); vertical-align: middle;
  }
  .card-footer {
    margin-top: auto; padding-top: 10px; border-top: 1px dashed var(--border);
    display: flex; justify-content: space-between; align-items: center; gap: 8px; font-size: .8rem;
  }
  .card-footer a { color: var(--accent); text-decoration: none; font-weight: 600; }
  .card-footer a:hover { text-decoration: underline; }
  .card-footer .date { color: var(--muted); white-space: nowrap; }
  .card-footer .links { display: flex; align-items: center; gap: 10px; }
  .gmaps-btn {
    display: inline-flex; align-items: center; gap: 5px;
    border: 1px solid var(--border); border-radius: 10px; padding: 3px 9px;
    color: var(--text) !important; font-weight: 600; font-size: .78rem;
    text-decoration: none !important; background: var(--card);
  }
  .gmaps-btn:hover { border-color: #4285F4; }
  .gmaps-btn svg { width: 13px; height: 13px; }
  /* --- תצוגה לפי כתבה --- */
  .article-group {
    background: var(--card); border: 1px solid var(--border); border-radius: 16px;
    box-shadow: var(--shadow); margin-bottom: 16px; overflow: hidden;
  }
  .article-header {
    width: 100%; display: flex; align-items: center; gap: 14px; padding: 0;
    border: none; background: none; color: inherit; cursor: pointer; text-align: start;
    font-family: inherit;
  }
  .article-header img {
    width: 150px; height: 96px; object-fit: cover; flex-shrink: 0;
    background: var(--chip);
  }
  .article-header .noimg {
    width: 150px; height: 96px; flex-shrink: 0; background: var(--chip);
    display: flex; align-items: center; justify-content: center; font-size: 1.6rem;
  }
  .article-info { flex: 1; padding: 10px 2px 10px 10px; min-width: 0; }
  .article-info h2 { margin: 0 0 5px; font-size: 1.02rem; line-height: 1.35; }
  .article-info .meta { color: var(--muted); font-size: .8rem; }
  .chevron { padding: 0 14px; font-size: 1rem; color: var(--muted); transition: transform .2s; }
  .article-group.open .chevron { transform: rotate(180deg); }
  .article-cards { padding: 14px; border-top: 1px solid var(--border); }
  .empty { text-align: center; color: var(--muted); padding: 60px 0; font-size: 1.05rem; }
  #moreBox { text-align: center; padding: 22px 0 0; }
  .loadmore {
    border: 1px solid var(--border); background: var(--card); color: var(--text);
    border-radius: 12px; padding: 11px 26px; cursor: pointer; font-size: .95rem; font-weight: 600;
  }
  .loadmore:hover { border-color: var(--accent); color: var(--accent); }
  footer { text-align: center; color: var(--muted); font-size: .78rem; padding: 0 20px 30px; max-width: 1100px; margin: 0 auto; }
  footer a { color: var(--muted); }
  @media (max-width: 480px) {
    .article-header img, .article-header .noimg { width: 96px; height: 80px; }
  }
</style>
</head>
<body>
<header>
  <div>
    <h1>מה אוכלים? <span class="accent">🍽️</span></h1>
    <p class="subtitle">מקומות שהומלצו בכתבות האוכל של TimeOut ישראל — כרטיס לכל מקום · <span id="lastRun"></span></p>
  </div>
  <button id="themeBtn">🌙 מצב כהה</button>
</header>

<div class="controls">
  <input id="search" type="search" placeholder="חיפוש מקום, מנה, שף, רחוב...">
  <div class="geo-row">
    <input id="addr" type="text" placeholder="📍 כתובת למיון לפי קרבה (למשל: דיזנגוף 100 תל אביב)">
    <button id="geoBtn">מיין לפי קרבה</button>
  </div>
  <div id="geoStatus" hidden></div>
  <div class="views">
    <button class="viewbtn active" data-view="articles">📰 לפי כתבה</button>
    <button class="viewbtn" data-view="cards">🃏 תצוגה חופשית</button>
    <button class="viewbtn" data-view="cityof">🏙️ העיר של</button>
  </div>
  <div class="tabs" id="tabs">
    <button class="tab active" data-region="tlv">תל אביב והמרכז <span class="count"></span></button>
    <button class="tab" data-region="haifa">חיפה והצפון <span class="count"></span></button>
    <button class="tab" data-region="rest">שאר הארץ <span class="count"></span></button>
  </div>
  <div class="chips" id="typeChips"></div>
</div>

<main>
  <div class="grid" id="grid"></div>
  <div id="articleList"></div>
  <div id="moreBox"></div>
  <div class="empty" id="empty" hidden>לא נמצאו מקומות מתאימים 🤷</div>
</main>

<footer>
  לשימוש אישי בלבד. כל ההמלצות שייכות ל-<a href="https://timeout.co.il" target="_blank" rel="noopener">TimeOut ישראל</a> — כל כרטיס מקשר לכתבה המקורית.
  חיפוש כתובות באדיבות <a href="https://www.openstreetmap.org" target="_blank" rel="noopener">OpenStreetMap</a>.
</footer>

<script>
const NOT_SPECIFIED = "לא צוין";
let cards = [], region = "tlv", activeType = null, onlyNew = false, query = "";
let view = "articles", geoPoint = null;
const expanded = new Set();

// טעינה הדרגתית — לא מציירים מאות כרטיסים בבת אחת
const CARD_CHUNK = 120, GROUP_CHUNK = 30;
let cardLimit = CARD_CHUNK, groupLimit = GROUP_CHUNK;
function rerender() { cardLimit = CARD_CHUNK; groupLimit = GROUP_CHUNK; render(); }

// מצב כהה: זיכרון מקומי, אחרת לפי העדפת המערכת
const saved = localStorage.getItem("theme");
const prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
setTheme(saved || (prefersDark ? "dark" : "light"));
function setTheme(t) {
  document.documentElement.dataset.theme = t;
  const btn = document.getElementById("themeBtn");
  if (btn) btn.textContent = t === "dark" ? "☀️ מצב בהיר" : "🌙 מצב כהה";
}
document.getElementById("themeBtn").onclick = () => {
  const next = document.documentElement.dataset.theme === "dark" ? "light" : "dark";
  localStorage.setItem("theme", next); setTheme(next);
};

const fmtDate = iso => new Date(iso).toLocaleDateString("he-IL",
  { day: "numeric", month: "long", year: "numeric", timeZone: "Asia/Jerusalem" });

fetch("data.json?t=" + Date.now())
  .then(r => r.json())
  .then(data => {
    cards = data.cards || [];
    // מיון מהחדש לישן לפי תאריך אמיתי (לא השוואת מחרוזות)
    cards.sort((a, b) => new Date(b.published) - new Date(a.published));
    if (data.last_run) {
      document.getElementById("lastRun").textContent = "עודכן: " + fmtDate(data.last_run);
    }
    buildTypeChips();
    render();
  })
  .catch(() => { document.getElementById("empty").hidden = false; });

document.querySelectorAll(".tab").forEach(t => t.onclick = () => {
  document.querySelectorAll(".tab").forEach(x => x.classList.remove("active"));
  t.classList.add("active"); region = t.dataset.region; rerender();
});

document.querySelectorAll(".viewbtn").forEach(b => b.onclick = () => {
  document.querySelectorAll(".viewbtn").forEach(x => x.classList.remove("active"));
  b.classList.add("active"); view = b.dataset.view; rerender();
});

document.getElementById("search").oninput = e => { query = e.target.value.trim(); rerender(); };

// --- חיפוש לפי כתובת (OpenStreetMap Nominatim) ---
const addrInput = document.getElementById("addr");
const geoBtn = document.getElementById("geoBtn");
geoBtn.onclick = locateAddress;
addrInput.onkeydown = e => { if (e.key === "Enter") locateAddress(); };

function geoStatusEl() { return document.getElementById("geoStatus"); }

async function locateAddress() {
  const q = addrInput.value.trim();
  if (!q) return;
  geoBtn.disabled = true; geoBtn.textContent = "מאתר...";
  try {
    const url = "https://nominatim.openstreetmap.org/search?format=json&limit=1&countrycodes=il&accept-language=he&q="
      + encodeURIComponent(q);
    const res = await fetch(url).then(r => r.json());
    if (!res.length) {
      showGeoStatus("לא הצלחתי לאתר את הכתובת — נסה לנסח אחרת (רחוב, מספר ועיר)", true);
      geoPoint = null;
    } else {
      geoPoint = { lat: +res[0].lat, lon: +res[0].lon, label: q };
      showGeoStatus("ממוין לפי קרבה אל: " + q);
    }
  } catch {
    showGeoStatus("שירות הכתובות לא זמין כרגע, נסה שוב עוד רגע", true);
    geoPoint = null;
  }
  geoBtn.disabled = false; geoBtn.textContent = "מיין לפי קרבה";
  rerender();
}

function showGeoStatus(msg, isError) {
  const el = geoStatusEl();
  el.hidden = false;
  el.className = isError ? "error" : "";
  el.innerHTML = esc(msg) + ' <button title="ביטול">✕</button>';
  el.querySelector("button").onclick = () => {
    geoPoint = null; el.hidden = true; addrInput.value = ""; rerender();
  };
}

function haversineKm(lat1, lon1, lat2, lon2) {
  const R = 6371, rad = d => d * Math.PI / 180;
  const dLat = rad(lat2 - lat1), dLon = rad(lon2 - lon1);
  const a = Math.sin(dLat / 2) ** 2 +
    Math.cos(rad(lat1)) * Math.cos(rad(lat2)) * Math.sin(dLon / 2) ** 2;
  return 2 * R * Math.asin(Math.sqrt(a));
}

function distKm(c) {
  if (!geoPoint || c.lat == null) return null;
  return haversineKm(geoPoint.lat, geoPoint.lon, c.lat, c.lon);
}

function fmtDist(km, precision) {
  const approx = precision !== "address" ? "≈" : "";
  if (km < 1) return approx + Math.round(km * 1000 / 10) * 10 + " מ'";
  return approx + km.toFixed(1) + ' ק"מ';
}

function buildTypeChips() {
  const counts = {};
  cards.forEach(c => { if (c.type !== NOT_SPECIFIED) counts[c.type] = (counts[c.type] || 0) + 1; });
  const types = Object.keys(counts).sort((a, b) => counts[b] - counts[a]);
  const box = document.getElementById("typeChips");
  const newChip = document.createElement("button");
  newChip.className = "chip newchip"; newChip.textContent = "✨ רק חדשים";
  newChip.onclick = () => { onlyNew = !onlyNew; newChip.classList.toggle("active", onlyNew); rerender(); };
  box.appendChild(newChip);
  types.forEach(t => {
    const b = document.createElement("button");
    b.className = "chip"; b.textContent = t;
    b.onclick = () => {
      activeType = activeType === t ? null : t;
      box.querySelectorAll(".chip:not(.newchip)").forEach(x => x.classList.toggle("active", x.textContent === activeType));
      rerender();
    };
    box.appendChild(b);
  });
}

// כתבות "העיר של X" — ראיונות אישיים, מוצגות רק בלשונית שלהן
const isCityOf = c => (c.article_title || "").includes("העיר של");

function matches(c) {
  if (view === "cityof" ? !isCityOf(c) : isCityOf(c)) return false;
  if (c.region !== region) return false;
  if (onlyNew && !c.is_new) return false;
  if (activeType && c.type !== activeType) return false;
  if (query) {
    const hay = [c.name, c.type, c.what_to_eat, c.owner, c.city, c.location, c.article_title].join(" ");
    if (!hay.includes(query)) return false;
  }
  return true;
}

function field(icon, value, label) {
  const missing = !value || value === NOT_SPECIFIED;
  return `<div class="field"><span class="ico">${icon}</span><span class="${missing ? "missing" : ""}">${
    missing ? label + ": " + NOT_SPECIFIED : esc(value)}</span></div>`;
}

const esc = s => String(s).replace(/[&<>"']/g, m =>
  ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[m]));

// הלוגו הצבעוני של גוגל (SVG רשמי) — לכפתור "פתח בגוגל מפות"
const GOOGLE_G = `<svg viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>`;

// "פתוח עכשיו" לפי שעון ישראל — רק לכרטיסים שהשעות שלהם פוענחו.
// מחזיר true/false, או null אם אין נתונים (ואז לא מוצג כלום).
function openNow(c) {
  const sched = (c.schedule && c.schedule.length) ? c.schedule
    : (c.enrichment && c.enrichment.schedule && c.enrichment.schedule.length ? c.enrichment.schedule : null);
  if (!sched) return null;
  const parts = new Intl.DateTimeFormat("en-US", {
    timeZone: "Asia/Jerusalem", weekday: "short", hour: "numeric",
    minute: "numeric", hourCycle: "h23",
  }).formatToParts(new Date());
  const get = t => parts.find(p => p.type === t).value;
  const day = { Sun: 0, Mon: 1, Tue: 2, Wed: 3, Thu: 4, Fri: 5, Sat: 6 }[get("weekday")];
  const mins = parseInt(get("hour")) * 60 + parseInt(get("minute"));
  const toMin = s => parseInt(s.slice(0, 2)) * 60 + parseInt(s.slice(3));
  for (const seg of sched) {
    const f = toMin(seg.from), t = toMin(seg.to);
    if (f < t) {
      if (seg.days.includes(day) && mins >= f && mins < t) return true;
    } else {
      // טווח שחוצה חצות (למשל 18:00-02:00)
      if (seg.days.includes(day) && mins >= f) return true;
      if (seg.days.includes((day + 6) % 7) && mins < t) return true;
    }
  }
  return false;
}

function srcBadge(e) {
  return ` <span class="src-badge" title="מקור: ${esc(e.source)} (${esc(e.date || "")})">🔎 ${esc(e.source)}</span>`;
}

function cardHTML(c) {
  const e = c.enrichment || null;
  // מיקום: מהכתבה, ואם חסר — מההעשרה (עם תג מקור)
  const locParts = [c.location, c.city].filter(v => v && v !== NOT_SPECIFIED);
  let loc = (locParts[1] && locParts[0] && locParts[0].includes(locParts[1]))
    ? locParts[0] : locParts.join(", ");
  const locFromArticle = !!loc;
  let locBadge = "";
  if (!loc && e && e.address) {
    loc = [e.address, c.city !== NOT_SPECIFIED ? c.city : ""].filter(Boolean).join(", ");
    locBadge = srcBadge(e);
  }
  const km = distKm(c);
  const distBadge = km !== null ? `<span class="badge-dist">📍 ${fmtDist(km, c.geo_precision)}</span>` : "";
  const st = openNow(c);
  const openBadge = st === null ? "" :
    st ? '<span class="open-badge open">🟢 פתוח עכשיו</span>'
       : '<span class="open-badge closed">🔴 סגור עכשיו</span>';
  // שעות: מהכתבה, ואם חסר — מההעשרה (עם תג מקור)
  const articleHours = c.hours && c.hours !== NOT_SPECIFIED;
  let hoursText, hoursMissing = false, hoursBadge = "";
  if (articleHours) { hoursText = esc(c.hours); }
  else if (e && e.hours) { hoursText = esc(e.hours); hoursBadge = srcBadge(e); }
  else { hoursText = "שעות: " + NOT_SPECIFIED; hoursMissing = true; }
  return `<article class="card">
    <div class="card-top">
      <h3>${esc(c.name)}</h3>
      <div class="badges">${distBadge}${c.closing_soon ? '<span class="badge-closing">⏳ הזדמנות אחרונה</span>' : ""}${c.is_new ? '<span class="badge-new">✨ חדש</span>' : ""}</div>
    </div>
    <span class="type-tag">${c.type === NOT_SPECIFIED ? "סוג: " + NOT_SPECIFIED : esc(c.type)}</span>
    ${c.owner ? `<div class="field"><span class="ico">🧑‍🍳</span><span>${esc(c.owner)}</span></div>` : ""}
    ${field("🍴", c.what_to_eat, "מה לאכול")}
    <div class="field"><span class="ico">🕐</span><span class="${hoursMissing ? "missing" : ""}">${
      hoursText}${openBadge}${hoursBadge}</span></div>
    <div class="field"><span class="ico">📍</span><span class="${loc ? "" : "missing"}">${
      loc ? esc(loc) : "מיקום: " + NOT_SPECIFIED}${locBadge}</span></div>
    ${c.opening_info ? `<div class="opening">🎉 ${esc(c.opening_info)}</div>` : ""}
    <div class="card-footer">
      <span class="links">
        <a href="${esc(c.article_url)}" target="_blank" rel="noopener" title="${esc(c.article_title)}">לכתבה ↗</a>
        <a class="gmaps-btn" target="_blank" rel="noopener" title="פתח בגוגל מפות"
           href="https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(
             c.name + " " + (c.city !== NOT_SPECIFIED ? c.city : "ישראל"))}">${GOOGLE_G} מפות</a>
      </span>
      <span class="date">${fmtDate(c.published)}</span>
    </div>
  </article>`;
}

function sortShown(list) {
  if (!geoPoint) return list; // כבר ממוין לפי תאריך
  return [...list].sort((a, b) => {
    const da = distKm(a), db = distKm(b);
    if (da === null && db === null) return new Date(b.published) - new Date(a.published);
    if (da === null) return 1;
    if (db === null) return -1;
    return da - db;
  });
}

function render() {
  const grid = document.getElementById("grid");
  const articleList = document.getElementById("articleList");
  const perRegion = { tlv: 0, haifa: 0, rest: 0 };
  cards.forEach(c => { if (c.region in perRegion) perRegion[c.region]++; });
  document.querySelectorAll(".tab").forEach(t =>
    t.querySelector(".count").textContent = "(" + perRegion[t.dataset.region] + ")");

  const shown = sortShown(cards.filter(matches));
  document.getElementById("empty").hidden = shown.length > 0;
  const moreBox = document.getElementById("moreBox");
  moreBox.innerHTML = "";

  if (view === "cards") {
    articleList.innerHTML = ""; articleList.hidden = true; grid.hidden = false;
    grid.innerHTML = shown.slice(0, cardLimit).map(cardHTML).join("");
    if (shown.length > cardLimit) {
      addLoadMore(moreBox, shown.length - cardLimit, () => { cardLimit += CARD_CHUNK; render(); });
    }
  } else {
    // "לפי כתבה" וגם "העיר של" — שתיהן תצוגות מקובצות לפי כתבה
    grid.innerHTML = ""; grid.hidden = true; articleList.hidden = false;
    renderArticles(shown, articleList, moreBox);
  }
}

function addLoadMore(box, remaining, onClick) {
  const b = document.createElement("button");
  b.className = "loadmore";
  b.textContent = `הצג עוד (${remaining} נוספים)`;
  b.onclick = onClick;
  box.appendChild(b);
}

function renderArticles(shown, box, moreBox) {
  // קיבוץ לפי כתבה
  const groups = new Map();
  shown.forEach(c => {
    if (!groups.has(c.article_url)) {
      groups.set(c.article_url, { url: c.article_url, title: c.article_title,
        image: c.article_image, published: c.published, cards: [] });
    }
    groups.get(c.article_url).cards.push(c);
  });
  let list = [...groups.values()];
  if (geoPoint) {
    const minDist = g => Math.min(...g.cards.map(c => { const d = distKm(c); return d === null ? Infinity : d; }));
    list.sort((a, b) => minDist(a) - minDist(b));
  } else {
    list.sort((a, b) => new Date(b.published) - new Date(a.published));
  }
  const visible = list.slice(0, groupLimit);
  // הכרטיסים שבתוך כתבה מצוירים רק בפתיחה (חיסכון גדול כשיש מאות כתבות)
  const byUrl = new Map(visible.map(g => [g.url, g]));
  box.innerHTML = visible.map(g => `
    <section class="article-group${expanded.has(g.url) ? " open" : ""}" data-url="${esc(g.url)}">
      <button class="article-header">
        ${g.image ? `<img src="${esc(g.image)}" alt="" loading="lazy" onerror="this.style.display='none'">`
                  : '<div class="noimg">🍽️</div>'}
        <div class="article-info">
          <h2>${esc(g.title)}</h2>
          <span class="meta">${fmtDate(g.published)} · ${g.cards.length} מקומות</span>
        </div>
        <span class="chevron">▾</span>
      </button>
      <div class="article-cards" ${expanded.has(g.url) ? "" : "hidden"}>
        <div class="grid">${expanded.has(g.url) ? g.cards.map(cardHTML).join("") : ""}</div>
      </div>
    </section>`).join("");
  box.querySelectorAll(".article-group").forEach(sec => {
    sec.querySelector(".article-header").onclick = () => {
      const url = sec.dataset.url;
      const cardsBox = sec.querySelector(".article-cards");
      if (expanded.has(url)) { expanded.delete(url); } else {
        expanded.add(url);
        const g = byUrl.get(url);
        const inner = cardsBox.querySelector(".grid");
        if (g && !inner.childElementCount) inner.innerHTML = g.cards.map(cardHTML).join("");
      }
      sec.classList.toggle("open");
      cardsBox.hidden = !expanded.has(url);
    };
  });
  if (list.length > groupLimit) {
    addLoadMore(moreBox, list.length - groupLimit, () => { groupLimit += GROUP_CHUNK; render(); });
  }
}
</script>
</body>
</html>
