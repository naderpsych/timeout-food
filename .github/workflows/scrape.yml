name: סריקת המלצות אוכל

on:
  schedule:
    # פעם ביום ב-03:30 UTC (06:30 בקיץ / 05:30 בחורף שעון ישראל)
    - cron: "30 3 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: scrape
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: התקנת תלויות
        run: pip install -r requirements.txt

      - name: הרצת הסורק
        run: python scraper.py

      - name: שמירת עדכונים
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data.json
          if git diff --cached --quiet; then
            echo "אין כרטיסים חדשים"
          else
            git commit -m "עדכון אוטומטי: כרטיסים חדשים ($(date -u +%Y-%m-%d))"
            git push
          fi
